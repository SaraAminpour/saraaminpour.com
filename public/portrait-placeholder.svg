<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Portrait placeholder</title>
  <desc id="desc">A soft gray placeholder for Sara Aminpour's portrait.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f4"/>
      <stop offset="0.45" stop-color="#d9d9d4"/>
      <stop offset="1" stop-color="#a8aba8"/>
    </linearGradient>
    <radialGradient id="halo" cx="52%" cy="26%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <rect width="1200" height="1500" fill="url(#halo)"/>
  <circle cx="600" cy="520" r="175" fill="#f8f8f6" opacity="0.8"/>
  <path d="M296 1220c32-270 168-408 304-408s272 138 304 408" fill="#f8f8f6" opacity="0.78"/>
  <text x="600" y="1350" text-anchor="middle" font-family="Arial, sans-serif" font-size="96" fill="#7d817f" letter-spacing="8">SA</text>
</svg>
